services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: dvp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dvp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dvp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongodb:
    image: mongo:7
    container_name: dvp-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: dvp
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: dvp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Migration runner — runs once then exits (restartPolicy: on-failure)
  # The app and worker services depend on this completing successfully.
  # ---------------------------------------------------------------------------
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dvp-migrate
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/dvp
      MONGODB_URL: mongodb://mongodb:27017
      MONGODB_DB: dvp
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-this-to-a-secure-random-key-in-production
      UPLOAD_DIR: /app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]

  # ---------------------------------------------------------------------------
  # API server
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dvp-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/dvp
      MONGODB_URL: mongodb://mongodb:27017
      MONGODB_DB: dvp
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-this-to-a-secure-random-key-in-production
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command:
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --workers
      - "4"

  # ---------------------------------------------------------------------------
  # ARQ background worker
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dvp-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/dvp
      MONGODB_URL: mongodb://mongodb:27017
      MONGODB_DB: dvp
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-this-to-a-secure-random-key-in-production
      UPLOAD_DIR: /app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["arq", "app.tasks.worker.WorkerSettings"]

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  uploads_data: